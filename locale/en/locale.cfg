[mod-setting-name]
factorial-enable-udp-bridge=Enable UDP Bridge
factorial-udp-port=UDP Send Port
factorial-udp-receive-port=UDP Receive Port
factorial-lmstudio-url=LM Studio Base URL
factorial-auto-poll-udp=Auto-Poll UDP
factorial-dev-mode=Dev Mode (Selectable Text)

[mod-setting-description]
factorial-enable-udp-bridge=Enable the UDP bridge to send factory snapshots to an external process.
factorial-udp-port=The port used to send data to the external UDP bridge process.
factorial-udp-receive-port=The port used to receive data from the external UDP bridge process.
factorial-lmstudio-url=Base URL for local LM Studio server (OpenAI-compatible API). Default: http://192.168.1.53:1234
factorial-auto-poll-udp=Automatically poll the UDP bridge for responses each tick.
factorial-dev-mode=Enable selectable/copyable text in the advisor window. Uses text-box elements instead of labels.
